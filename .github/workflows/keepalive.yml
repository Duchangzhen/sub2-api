name: Keep Render Service Awake

on:
  push:
    branches:
      - main
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: keep-render-service-awake
  cancel-in-progress: true

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Ping public endpoints
        run: |
          curl --fail --silent --show-error --max-time 30 --retry 2 --retry-delay 5 \
            "https://acaim.onrender.com/setup/status?keepalive=github-actions" || \
          curl --fail --silent --show-error --max-time 30 --retry 2 --retry-delay 5 \
            "https://acaim.onrender.com/?keepalive=github-actions"
