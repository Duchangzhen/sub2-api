name: Keep Render Service Awake

on:
  push:
    branches:
      - main
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: keep-render-service-awake
  cancel-in-progress: true

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 4
    steps:
      - name: Ping public endpoints
        run: |
          for attempt in {1..12}; do
            body=$(curl --fail --silent --show-error --max-time 30 \
              "https://acaim.onrender.com/health?keepalive=github-actions&attempt=${attempt}" || true)
            if printf '%s' "$body" | grep -q '"status":"ok"'; then
              echo "ACAIM is awake"
              exit 0
            fi
            echo "Waiting for ACAIM to wake up (${attempt}/12)"
            sleep 10
          done
          echo "ACAIM did not become healthy in time"
          exit 1
